<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Switch body -->
  <rect x="8" y="22" width="48" height="20" rx="2" fill="#4A5568" stroke="#2D3748" stroke-width="2"/>

  <!-- Port indicators (front panel) -->
  <rect x="12" y="28" width="4" height="8" rx="1" fill="#007AFF"/>
  <rect x="18" y="28" width="4" height="8" rx="1" fill="#007AFF"/>
  <rect x="24" y="28" width="4" height="8" rx="1" fill="#007AFF"/>
  <rect x="30" y="28" width="4" height="8" rx="1" fill="#007AFF"/>
  <rect x="36" y="28" width="4" height="8" rx="1" fill="#007AFF"/>
  <rect x="42" y="28" width="4" height="8" rx="1" fill="#007AFF"/>
  <rect x="48" y="28" width="4" height="8" rx="1" fill="#999"/>

  <!-- Status LEDs -->
  <circle cx="14" cy="32" r="1" fill="#00FF00"/>
  <circle cx="20" cy="32" r="1" fill="#00FF00"/>
  <circle cx="26" cy="32" r="1" fill="#00FF00"/>
  <circle cx="32" cy="32" r="1" fill="#FFAA00"/>
  <circle cx="38" cy="32" r="1" fill="#00FF00"/>
  <circle cx="44" cy="32" r="1" fill="#00FF00"/>

  <!-- Brand indicator -->
  <circle cx="50" cy="32" r="1.5" fill="#00FF00" opacity="0.6"/>

  <!-- 3D depth lines -->
  <line x1="8" y1="42" x2="8" y2="45" stroke="#2D3748" stroke-width="2"/>
  <line x1="56" y1="42" x2="56" y2="45" stroke="#2D3748" stroke-width="2"/>
  <line x1="8" y1="45" x2="56" y2="45" stroke="#2D3748" stroke-width="2"/>
</svg>
