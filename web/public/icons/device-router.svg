<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Router body -->
  <rect x="12" y="32" width="40" height="20" rx="3" fill="#E8E8E8" stroke="#333" stroke-width="2"/>

  <!-- Antenna 1 (left) -->
  <line x1="20" y1="32" x2="16" y2="18" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="16" cy="16" r="2.5" fill="#333"/>

  <!-- Antenna 2 (right) -->
  <line x1="44" y1="32" x2="48" y2="18" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="48" cy="16" r="2.5" fill="#333"/>

  <!-- Status lights -->
  <circle cx="20" cy="40" r="2" fill="#00FF00" opacity="0.8"/>
  <circle cx="28" cy="40" r="2" fill="#00FF00" opacity="0.8"/>
  <circle cx="36" cy="40" r="2" fill="#FFAA00" opacity="0.8"/>
  <circle cx="44" cy="40" r="2" fill="#00FF00" opacity="0.8"/>

  <!-- Base stand -->
  <rect x="26" y="50" width="12" height="3" rx="1" fill="#999"/>
</svg>
