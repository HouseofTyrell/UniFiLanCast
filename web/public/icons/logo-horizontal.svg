<svg width="600" height="150" viewBox="0 0 600 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon part -->
  <g transform="translate(15, 15)">
    <!-- Background circle -->
    <circle cx="60" cy="60" r="58" fill="#0B2447" stroke="#1E4976" stroke-width="2"/>

    <!-- Outer arc -->
    <path d="M 84 28 A 33 33 0 0 1 92 60" stroke="#5B8FB9" stroke-width="4" stroke-linecap="round" fill="none"/>

    <!-- Middle arc -->
    <path d="M 77 37 A 26 26 0 0 1 82 60" stroke="#4A9ECC" stroke-width="3.5" stroke-linecap="round" fill="none"/>

    <!-- Inner spiral arc -->
    <path d="M 70 45 A 19 19 0 0 1 73 60" stroke="#6BB6E0" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Curved flow lines -->
    <path d="M 37 33 Q 47 43 57 46" stroke="#5B8FB9" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 33 52 Q 42 57 52 59" stroke="#4A9ECC" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M 36 70 Q 45 67 55 65" stroke="#6BB6E0" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Network nodes -->
    <circle cx="84" cy="28" r="5" fill="white"/>
    <circle cx="37" cy="33" r="4.5" fill="white"/>
    <circle cx="77" cy="37" r="4" fill="white"/>
    <circle cx="33" cy="52" r="4" fill="white"/>
    <circle cx="70" cy="45" r="4" fill="white"/>
    <circle cx="36" cy="70" r="4.5" fill="white"/>
    <circle cx="55" cy="65" r="3.5" fill="white"/>
    <circle cx="73" cy="60" r="4" fill="white"/>

    <!-- Central glow -->
    <circle cx="60" cy="60" r="23" fill="url(#glow)" opacity="0.3"/>

    <defs>
      <radialGradient id="glow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" style="stop-color:#6BB6E0;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#0B2447;stop-opacity:0" />
      </radialGradient>
    </defs>
  </g>

  <!-- Text part -->
  <text x="160" y="95" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#1A2332">UniFi</text>
  <text x="310" y="95" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#1A2332">Lan</text>
  <text x="415" y="95" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#1A2332">Cast</text>
</svg>
