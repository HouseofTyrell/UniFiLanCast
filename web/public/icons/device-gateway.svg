<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gateway body (modern modem/router design) -->
  <rect x="14" y="26" width="36" height="20" rx="2" fill="#2D3748" stroke="#1A202C" stroke-width="2"/>

  <!-- Vents on top -->
  <line x1="18" y1="30" x2="46" y2="30" stroke="#1A202C" stroke-width="1" opacity="0.5"/>
  <line x1="18" y1="33" x2="46" y2="33" stroke="#1A202C" stroke-width="1" opacity="0.5"/>
  <line x1="18" y1="36" x2="46" y2="36" stroke="#1A202C" stroke-width="1" opacity="0.5"/>

  <!-- Signal indicators -->
  <circle cx="20" cy="40" r="2" fill="#FF9500" opacity="0.9"/>
  <circle cx="28" cy="40" r="2" fill="#00FF00" opacity="0.9"/>
  <circle cx="36" cy="40" r="2" fill="#00FF00" opacity="0.9"/>

  <!-- WAN indicator -->
  <rect x="42" y="38" width="5" height="4" rx="1" fill="#007AFF" opacity="0.8"/>

  <!-- Antenna (single, modern) -->
  <line x1="48" y1="26" x2="52" y2="16" stroke="#1A202C" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="52" cy="14" r="2" fill="#1A202C"/>

  <!-- Signal waves (emanating) -->
  <path d="M 22 20 Q 26 18 30 20" stroke="#007AFF" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 20 16 Q 26 13 32 16" stroke="#007AFF" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M 18 12 Q 26 8 34 12" stroke="#007AFF" stroke-width="1.5" fill="none" opacity="0.3"/>
</svg>
