<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Access Point body (ceiling-mounted UFO style) -->
  <ellipse cx="32" cy="36" rx="18" ry="8" fill="#E8E8E8" stroke="#333" stroke-width="2"/>
  <ellipse cx="32" cy="32" rx="18" ry="4" fill="#FFF"/>

  <!-- Central status light -->
  <circle cx="32" cy="32" r="3" fill="#34C759" opacity="0.8"/>

  <!-- WiFi signal waves (concentric arcs) -->
  <path d="M 32 28 Q 28 24 24 24" stroke="#34C759" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 32 28 Q 36 24 40 24" stroke="#34C759" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

  <path d="M 32 24 Q 26 18 20 18" stroke="#34C759" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 32 24 Q 38 18 44 18" stroke="#34C759" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

  <path d="M 32 20 Q 24 12 16 12" stroke="#34C759" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M 32 20 Q 40 12 48 12" stroke="#34C759" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Mount/cable -->
  <line x1="32" y1="44" x2="32" y2="52" stroke="#666" stroke-width="2"/>
  <circle cx="32" cy="52" r="2" fill="#666"/>
</svg>
